services:
  # JavaScript SPA (Vite/React). Open http://localhost:FRONTEND_PORT — `/api` proxied to the `web` service.
  frontend:
    image: node:20-bookworm-slim
    container_name: chb-frontend
    working_dir: /app
    volumes:
      - ..:/app
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_DEV_API_PROXY: http://web:80
    command: sh -c "npm ci && npm run dev"
    depends_on:
      - web

  # PHP/Apache: JSON API (/public/api/), OAuth, mail, and legacy .php pages. Main UI is the `frontend` service.
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chb-web
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-change_hair_beauty}
      DB_USER: ${DB_USER:-salon_user}
      DB_PASS: ${DB_PASS:-salon_secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000,http://127.0.0.1:3000}
      CHB_SESSION_CROSS_SITE: ${CHB_SESSION_CROSS_SITE:-0}
      ADMIN_BOOKING_WEBHOOK_URL: ${ADMIN_BOOKING_WEBHOOK_URL:-}
      ADMIN_BOOKING_WEBHOOK_SECRET: ${ADMIN_BOOKING_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: chb-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-change_hair_beauty}
      MYSQL_USER: ${DB_USER:-salon_user}
      MYSQL_PASSWORD: ${DB_PASS:-salon_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret_change_me}
    # Host 3306 is often taken (other DBs/tools); map MySQL to 3307 by default
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 25s

  # Same MySQL as `db` — browse tables in the browser (optional; does not change data)
  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: chb-phpmyadmin
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
