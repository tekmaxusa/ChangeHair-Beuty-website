name: Deploy api to cPanel

on:
  push:
    branches: [main, payment]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  rsync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Rsync to cPanel over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          args: --exclude sql/ --exclude .env --exclude .dockerignore
          path: api/
          remote_path: ${{ secrets.CPANEL_REMOTE_PATH }}
          remote_host: ${{ secrets.CPANEL_SSH_HOST }}
          remote_user: ${{ secrets.CPANEL_SSH_USER }}
          remote_key: ${{ secrets.CPANEL_SSH_KEY }}
